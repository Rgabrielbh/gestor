{% extends "base_auth.html" %}
{% load i18n %}
{% block auth_content %}
<div class="auth-card">
  <div class="auth-logo"><div class="auth-logo-text"><span class="auth-logo-ntt">NTT</span><span class="auth-logo-data"> DATA</span></div></div>
  <h2 class="auth-title">{% trans "Redefinir senha" %}</h2>
  {% block reset_content %}
  <form method="post">{% csrf_token %}{{ form.as_p }}
    <button type="submit" class="btn btn-primary" style="width:100%;">{% trans "Enviar" %}</button>
  </form>
  {% endblock %}
  <div style="margin-top:1rem;text-align:center;">
    <a href="{% url 'login' %}" style="font-size:.85rem;color:var(--ntt-blue);text-decoration:none;">{% trans "Voltar ao login" %}</a>
  </div>
</div>
{% endblock %}
