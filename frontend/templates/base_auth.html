{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NTT Data{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet" />
  <link href="{% static 'css/nttdata.css' %}" rel="stylesheet" />
  {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">
  {% block auth_content %}{% endblock %}
  <script src="{% static 'js/nttdata.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
